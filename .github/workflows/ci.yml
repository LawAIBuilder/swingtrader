name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Pin concurrency so a rapid succession of pushes only runs the most recent
# build, but always finish a PR's check group rather than cancel mid-flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  verify:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    # Build runs `next build`, which can fail if it tries to evaluate Supabase
    # auth at module-load. We provide stub values so env.ts parses cleanly.
    # No real network is reached during build.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
